<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banyan Bible</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    :root {
      --bg-dark: #121418;
      --text-light: #e0e6f0;
      --text-muted: #8a94a6;
      --blue-accent: #3a9df8;
      --green-accent: #22d7a5;
      --shadow-dark: rgba(0, 0, 0, 0.7);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1c2028;
      padding: 1.8rem 2rem;
      font-weight: 700;
      font-size: 2.2rem;
      color: var(--green-accent);
      text-shadow: 0 0 8px var(--green-accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      user-select: none;
      box-shadow: 0 2px 12px var(--shadow-dark);
      text-align: center;
    }

    main {
      flex-grow: 1;
      max-width: 900px;
      margin: 2rem auto 4rem;
      padding: 0 1.5rem;
      line-height: 1.65;
      font-size: 1.12rem;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    h1 {
      color: var(--blue-accent);
      font-weight: 800;
      font-size: 2.6rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 6px var(--blue-accent);
      user-select: text;
    }

    pre {
      background: #1c2028;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      color: var(--text-light);
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      overflow-x: auto;
      max-height: 600px;
      box-shadow: inset 0 0 15px rgba(0, 74, 153, 0.5);
      user-select: text;
    }

    nav {
      margin-top: 3rem;
      text-align: center;
    }

    nav button {
      background: var(--green-accent);
      border: none;
      padding: 0.8rem 1.8rem;
      font-weight: 700;
      font-size: 1rem;
      color: var(--bg-dark);
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 12px var(--green-accent);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
    }

    nav button:hover,
    nav button:focus-visible {
      background: #18b98c;
      box-shadow: 0 0 20px #18b98c;
      outline: none;
    }
  </style>
</head>
<body>
  <header>Banyan Bible</header>

  <main>
    <h1>Confluence Documentation</h1>
    <pre>
Paste or embed your confluence docs here...

Example:
- User permissions overview
- Carrier Loads permission group details
- Workflow process descriptions
- FAQs and troubleshooting tips

Keep this updated as your single source of truth.
    </pre>

    <nav>
      <button onclick="goHome()">Back to Home</button>
    </nav>
  </main>

  <script>
    function goHome() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
