<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training Management System - Dark Mode</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    :root {
      --bg-dark: #121418;
      --bg-darker: #0a0c0f;
      --text-light: #e0e6f0;
      --text-muted: #8a94a6;
      --blue-accent: #3a9df8;
      --green-accent: #22d7a5;
      --shadow-glow: rgba(34, 215, 165, 0.35);
      --shadow-dark: rgba(0, 0, 0, 0.7);
      --focus-outline: #22d7a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--bg-darker);
      padding: 1.8rem 2rem;
      text-align: center;
      color: var(--green-accent);
      font-weight: 700;
      font-size: 2.4rem;
      letter-spacing: 0.12em;
      user-select: none;
      text-shadow: 0 0 10px var(--green-accent);
      box-shadow: 0 2px 12px var(--shadow-dark);
      text-transform: uppercase;
    }

    main {
      flex-grow: 1;
      padding: 3rem 2rem 5rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .modules {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 3rem 4rem;
      width: 100%;
      max-width: 1100px;
    }

    .module-card {
      background: #1c2028;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
      cursor: pointer;
      padding: 3.5rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition:
        transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        box-shadow 0.35s ease;
      border: 3px solid transparent;
      user-select: none;
    }

    .module-card:hover,
    .module-card:focus-visible {
      transform: translateY(-12px) scale(1.06);
      box-shadow:
        0 0 12px var(--green-accent),
        0 0 25px var(--green-accent),
        0 0 40px var(--green-accent);
      border-color: var(--green-accent);
      outline: none;
    }

    .module-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--blue-accent);
      margin-bottom: 1rem;
      letter-spacing: 0.06em;
      user-select: text;
      text-transform: uppercase;
      text-shadow: 0 0 5px var(--blue-accent);
    }

    .module-desc {
      font-size: 1.25rem;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 350px;
      user-select: text;
      font-weight: 500;
    }

    footer {
      background: var(--bg-darker);
      padding: 1.8rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 -3px 20px var(--shadow-dark);
    }

    footer img {
      height: 60px;
      filter: drop-shadow(0 0 8px var(--green-accent));
      user-select: none;
      transition: filter 0.3s ease;
    }
    footer img:hover {
      filter: drop-shadow(0 0 15px var(--green-accent));
    }

    /* Accessibility: focus ring for keyboard navigation */
    .module-card:focus-visible {
      outline: 3px solid var(--focus-outline);
      outline-offset: 4px;
    }

    /* Responsive tweaks */
    @media (max-width: 420px) {
      main {
        padding: 2rem 1rem 4rem;
      }
      .module-card {
        padding: 3rem 2rem;
      }
      .module-title {
        font-size: 1.8rem;
      }
      .module-desc {
        font-size: 1.05rem;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>
  <header>Training Management System</header>

  <main>
    <div class="modules" role="list">
      <div class="module-card" onclick="openModule('freight101.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Freight 101</div>
        <div class="module-desc">Basic freight terms and concepts for beginners.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanOverview.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Banyan Overview</div>
        <div class="module-desc">What Banyan Technology does and who their clients are.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanBible.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Banyan Bible</div>
        <div class="module-desc">The full Confluence documentation and deep-dive references.</div>
      </div>
      <div class="module-card" onclick="openModule('questions.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Questions</div>
        <div class="module-desc">Common questions and answers for beginners starting out.</div>
      </div>
    </div>
  </main>

  <footer>
    <img src="logo.webp" alt="Banyan Technology Logo" />
  </footer>

  <script>
    function openModule(page) {
      window.location.href = page;
    }
    // Accessibility: allow Enter and Space keys to activate modules
    document.querySelectorAll('.module-card').forEach(card => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>
</body>
</html>
