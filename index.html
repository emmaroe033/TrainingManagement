<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training Management System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    :root {
      --blue-dark: #004a99;
      --blue-medium: #2a75bb;
      --blue-light: #c7ddf9;
      --highlight: #4db6ff;
      --text-dark: #222;
      --bg-light: #f5f9fc;
      --shadow-light: rgba(0, 74, 153, 0.12);
      --shadow-hover: rgba(77, 182, 255, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eaf2fb 0%, #f9fbff 100%);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(90deg, #004a99 0%, #2a75bb 100%);
      padding: 1.8rem 2rem;
      text-align: center;
      color: white;
      font-weight: 700;
      font-size: 2.3rem;
      letter-spacing: 1.1px;
      box-shadow: 0 4px 15px var(--shadow-light);
      user-select: none;
      text-shadow: 0 0 6px rgba(255 255 255 / 0.15);
    }

    main {
      flex-grow: 1;
      padding: 3.5rem 2rem 5rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .modules {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 3rem 4rem;
      width: 100%;
      max-width: 1100px;
    }

    .module-card {
      background: rgba(255 255 255 / 0.85);
      border-radius: 18px;
      box-shadow: 0 10px 30px var(--shadow-light);
      cursor: pointer;
      padding: 3.5rem 2.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.35s ease, background-color 0.35s ease;
      border: 2px solid transparent;
      backdrop-filter: saturate(180%) blur(15px);
      user-select: none;
    }

    .module-card:hover,
    .module-card:focus-visible {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 18px 48px var(--shadow-hover);
      border-color: var(--highlight);
      background: rgba(77 182 255 / 0.15);
      outline: none;
    }

    .module-title {
      font-size: 2.1rem;
      font-weight: 800;
      color: var(--blue-dark);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      user-select: text;
    }

    .module-desc {
      font-size: 1.2rem;
      color: var(--blue-medium);
      line-height: 1.5;
      max-width: 340px;
      user-select: text;
      font-weight: 500;
    }

    footer {
      background: var(--blue-dark);
      padding: 1.6rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 -3px 15px var(--shadow-light);
    }

    footer img {
      height: 48px;
      filter: drop-shadow(0 0 3px rgba(0 74 153 / 0.6));
      user-select: none;
    }

    /* Responsive tweaks */
    @media (max-width: 420px) {
      main {
        padding: 2.5rem 1rem 4rem;
      }
      .module-card {
        padding: 3rem 2rem;
      }
      .module-title {
        font-size: 1.75rem;
      }
      .module-desc {
        font-size: 1rem;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <header>Training Management System</header>

  <main>
    <div class="modules" role="list">
      <div class="module-card" onclick="openModule('freight101.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Freight 101</div>
        <div class="module-desc">Basic freight terms and concepts for beginners.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanOverview.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Banyan Overview</div>
        <div class="module-desc">What Banyan Technology does and who their clients are.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanBible.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Banyan Bible</div>
        <div class="module-desc">The full Confluence documentation and deep-dive references.</div>
      </div>
      <div class="module-card" onclick="openModule('questions.html')" tabindex="0" role="listitem button" aria-pressed="false">
        <div class="module-title">Questions</div>
        <div class="module-desc">Common questions and answers for beginners starting out.</div>
      </div>
    </div>
  </main>

  <footer>
    <img src="logo.webp" alt="Banyan Technology logo" />
  </footer>

  <script>
    function openModule(page) {
      window.location.href = page;
    }
    // Accessibility: allow Enter and Space keys to activate modules
    document.querySelectorAll('.module-card').forEach(card => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>
</body>
</html>
