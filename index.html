<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training Management System</title>
  <style>
    /* Colors inspired by Banyan: blues and neon greens */
    :root {
      --blue-dark: #004a99;
      --blue-medium: #2a75bb;
      --blue-light: #c7ddf9;
      --green-neon: #7effa7;
      --text-dark: #222;
      --bg-light: #f5f9fc;
      --shadow: rgba(0, 74, 153, 0.2);
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--blue-dark);
      padding: 1.5rem;
      text-align: center;
      color: white;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 1px;
      box-shadow: 0 4px 10px var(--shadow);
    }

    main {
      flex-grow: 1;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .modules {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
      max-width: 900px;
      justify-content: center;
      width: 100%;
    }

    .module-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 3px 12px var(--shadow);
      cursor: pointer;
      width: 280px;
      padding: 2rem 1.5rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border-top: 6px solid var(--green-neon);
    }

    .module-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .module-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 0.7rem;
      user-select: none;
    }

    .module-desc {
      font-size: 1rem;
      color: var(--blue-medium);
      line-height: 1.3;
      user-select: none;
    }

    @media (max-width: 650px) {
      main {
        padding: 1rem;
      }
      .module-card {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>Training Management System</header>
  <main>
    <div class="modules">
      <div class="module-card" onclick="openModule('freight101.html')" tabindex="0" role="button" aria-pressed="false">
        <div class="module-title">Freight 101</div>
        <div class="module-desc">Basic freight terms and concepts for beginners.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanOverview.html')" tabindex="0" role="button" aria-pressed="false">
        <div class="module-title">Banyan Overview</div>
        <div class="module-desc">What Banyan Technology does and who their clients are.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanBible.html')" tabindex="0" role="button" aria-pressed="false">
        <div class="module-title">Banyan Bible</div>
        <div class="module-desc">The full Confluence documentation and deep-dive references.</div>
      </div>
    </div>
  </main>

  <script>
    function openModule(page) {
      window.location.href = page;
    }
    // Accessibility: allow Enter key to activate modules
    document.querySelectorAll('.module-card').forEach(card => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>
</body>
</html>
