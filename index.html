<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Training Management System</title>
  <style>
    :root {
      --blue-dark: #004a99;
      --blue-medium: #2a75bb;
      --blue-light: #c7ddf9;
      --highlight: #4db6ff; /* softer blue */
      --text-dark: #222;
      --bg-light: #f5f9fc;
      --shadow: rgba(0, 74, 153, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--blue-dark);
      padding: 1.5rem 2rem;
      text-align: center;
      color: white;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 1px;
      box-shadow: 0 3px 12px var(--shadow);
      user-select: none;
    }

    main {
      flex-grow: 1;
      padding: 3rem 2rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .modules {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem 3rem;
      width: 100%;
      max-width: 1000px;
    }

    .module-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 18px var(--shadow);
      cursor: pointer;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 3px solid transparent;
      user-select: none;
    }

    .module-card:hover,
    .module-card:focus-visible {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px var(--shadow);
      border-color: var(--highlight);
      outline: none;
    }

    .module-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 0.8rem;
    }

    .module-desc {
      font-size: 1.05rem;
      color: var(--blue-medium);
      line-height: 1.4;
      max-width: 320px;
    }

    @media (max-width: 400px) {
      main {
        padding: 2rem 1rem;
      }
      .module-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>Training Management System</header>
  <main>
    <div class="modules">
      <div class="module-card" onclick="openModule('freight101.html')" tabindex="0" role="button" aria-pressed="false">
        <div class="module-title">Freight 101</div>
        <div class="module-desc">Basic freight terms and concepts for beginners.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanOverview.html')" tabindex="0" role="button" aria-pressed="false">
        <div class="module-title">Banyan Overview</div>
        <div class="module-desc">What Banyan Technology does and who their clients are.</div>
      </div>
      <div class="module-card" onclick="openModule('banyanBible.html')" tabindex="0" role="button" aria-pressed="false">
        <div class="module-title">Banyan Bible</div>
        <div class="module-desc">The full Confluence documentation and deep-dive references.</div>
      </div>
      <div class="module-card" onclick="openModule('questions.html')" tabindex="0" role="button" aria-pressed="false">
        <div class="module-title">Questions</div>
        <div class="module-desc">Common questions and answers for beginners starting out.</div>
      </div>
    </div>
  </main>

  <script>
    function openModule(page) {
      window.location.href = page;
    }
    // Accessibility: allow Enter key to activate modules
    document.querySelectorAll('.module-card').forEach(card => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>
</body>
</html>
